# Inject VARSITY_API_KEY via the runtime environment before starting the runtime.
competition_id: 4
symbol: BTCUSDT
interval: 1m
tick_interval_seconds: 30
kline_limit: 120
orderbook_depth: 20
max_iterations: null
stop_when_competition_inactive: true
error_backoff_seconds: 5
dry_run: false
adapter_retry_attempts: 3
adapter_retry_backoff_seconds: 0.5
adapter_min_call_spacing_seconds: 0.0

policy:
  type: agent_exec
  # CLI backend: "auto" detects from PATH (prefers claude), "codex" or "claude" to force.
  backend: auto
  # model: claude-sonnet-4-6  # Optional model override for the CLI backend.
  # indicator_mode: "full" computes all available indicators (builtin + TA-Lib if installed).
  # "custom" uses the signal_indicators list below. Omit for top-level signal_indicators fallback.
  indicator_mode: full
  timeout_seconds: 20
  recent_transition_limit: 5
  fail_open_to_hold: true
  sandbox_mode: read-only
  bootstrap_from_transition_log: true
  strategy_context: active_momentum
  extra_instructions: >-
    All available technical indicators are pre-computed in the features section.
    You decide which indicators matter for the current market regime — trend, momentum,
    volatility, and volume signals are all available. Combine them freely.
    Be decisive. Consecutive HOLDs waste opportunity in a time-limited competition.
    A strategy layer handles position sizing (volatility-scaled) and TP/SL placement
    (ATR-based) automatically. Focus on direction and timing — the strategy refines
    your size and TP/SL. A trailing stop and drawdown exit also run automatically.

# Strategy layer — composable building blocks between policy decision and executor.
# Omit or leave empty to let the agent control sizing/TP/SL directly.
strategy:
  sizing:
    type: volatility_scaled
    target_risk_pct: 0.02
    atr_multiplier: 2.0
  tpsl:
    type: atr_multiple
    atr_tp_mult: 2.0
    atr_sl_mult: 1.5
  entry_filters:
    - type: trade_budget
      min_remaining_trades: 5
  exit_rules:
    - type: trailing_stop
      atr_multiplier: 2.0
    - type: drawdown_exit
      max_drawdown_pct: 0.02

risk_limits:
  max_position_size_pct: 0.1
  max_absolute_size: 0.01
  min_size: 0.001
  quantity_precision: 3
  price_precision: 2
  max_trades: 40
  min_seconds_between_trades: 60
  allow_long: true
  allow_short: true

storage:
  transition_path: ./artifacts/transitions_codex.jsonl
  journal_path: ./artifacts/journal_codex.jsonl
  max_in_memory_transitions: 1000

observability:
  enabled: true
  host: 127.0.0.1
  port: 8767
  max_transitions: 20
  max_logs: 50
  no_transition_threshold_seconds: 90
  no_transition_error_threshold_seconds: 180
  max_decision_latency_seconds: 20
  max_consecutive_runtime_errors: 3
  supervisor_stop_on_error: true
