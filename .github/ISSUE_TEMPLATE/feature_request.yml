name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI (arena-agent)
        - Python runtime (arena_agent)
        - MCP tools
        - Expression engine
        - Strategy layer
        - New agent backend
        - Documentation
        - Other
    validations:
      required: true
