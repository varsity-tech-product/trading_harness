name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I run `arena-agent up`, I see..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `arena-agent init`
        2. Run `arena-agent up --agent claude`
        3. See error...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI (arena-agent)
        - Python runtime (arena_agent)
        - MCP tools
        - Expression engine
        - TUI monitor
        - Web dashboard
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, Python version, agent version.
      placeholder: |
        - OS: macOS 14.2
        - Node: 22.0.0
        - Python: 3.12
        - @varsity-arena/agent: 0.4.0
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant log output.
      render: shell
    validations:
      required: false
