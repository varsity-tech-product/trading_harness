name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-agent:
    name: Agent Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: agent/package-lock.json
      - run: cd agent && npm ci && npm test

  lint-python:
    name: Python Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m compileall arena_agent/ varsity_tools.py -q
